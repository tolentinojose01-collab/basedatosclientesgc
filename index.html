                            if (new Date(v.date).toDateString() === today) todayVisits++;
                        }
                    }
                }
                if (todayVisits > 0) { badge.textContent = todayVisits;
                    badge.style.display = 'block'; } else { badge.style.display = 'none'; }
            } else { badge.style.display = 'none'; }
        }

        // ======================================================================
        //  NAVEGACIÓN
        // ======================================================================
        function switchView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            currentView = viewId;
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            const navMap = { 'viewList': 'viewList', 'viewForm': 'viewForm', 'viewStats': 'viewStats',
                'viewDetail': 'viewList' };
            const navId = navMap[viewId] || 'viewList';
            document.querySelector(`.nav-item[data-view="${navId}"]`).classList.add('active');
            document.getElementById('mainContent').scrollTop = 0;
        }

        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                const view = item.dataset.view;
                if (view === 'viewForm') { resetForm(); if (!editingId) { document.getElementById('formTitle')
                            .textContent = 'Nuevo Cliente';
                        document.getElementById('formSubmitBtn').innerHTML = '<i class="fas fa-save"></i> Guardar'; } }
                switchView(view);
                if (view === 'viewStats') renderStats();
            });
        });

        document.getElementById('addQuickBtn').addEventListener('click', () => { resetForm();
            switchView('viewForm');
            document.getElementById('fName').focus(); });
        document.getElementById('navAdd').addEventListener('click', () => { resetForm();
            switchView('viewForm');
            document.getElementById('fName').focus(); });
        document.getElementById('detailBackBtn').addEventListener('click', () => { switchView('viewList');
            refreshList(); });

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase().trim();
            if (!q) { renderClientList(clientDataCache); return; }
            const filtered = clientDataCache.filter(c =>
                (c.name || '').toLowerCase().includes(q) ||
                (c.business || '').toLowerCase().includes(q) ||
                (c.address || '').toLowerCase().includes(q) ||
                (c.colony || '').toLowerCase().includes(q) ||
                (c.phone || '').includes(q)
            );
            renderClientList(filtered);
        });

        document.getElementById('geoBtn').addEventListener('click', geocodeManual);
        document.getElementById('fAddress').addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault();
                geocodeManual(); } });
        document.getElementById('updateMapCoords').addEventListener('click', updateMapFromCoords);
        document.getElementById('fLat').addEventListener('input', updateGoogleMapsLink);
        document.getElementById('fLng').addEventListener('input', updateGoogleMapsLink);

        document.getElementById('resetDataBtn').addEventListener('click', () => {
            showModal('Eliminar Todos', '¿Eliminar TODOS los clientes? Esta acción no se puede deshacer.', 'Eliminar',
                async () => { await clearAllClients();
                    showToast('Todos eliminados', 'info');
                    refreshList(); });
        });

        // ======================================================================
        //  TEMA
        // ======================================================================
        document.getElementById('themeToggle').addEventListener('click', () => {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            if (isDark) { html.removeAttribute('data-theme');
                document.getElementById('themeToggle').innerHTML = '<i class="fas fa-moon"></i>';
                localStorage.setItem('theme', 'light'); } else { html.setAttribute('data-theme', 'dark');
                document.getElementById('themeToggle').innerHTML = '<i class="fas fa-sun"></i>';
                localStorage.setItem('theme', 'dark'); }
        });
        if (localStorage.getItem('theme') === 'dark') { document.documentElement.setAttribute('data-theme', 'dark');
            document.getElementById('themeToggle').innerHTML = '<i class="fas fa-sun"></i>'; }

        // ======================================================================
        //  INIT
        // ======================================================================
        async function init() {
            try {
                localDB = await openLocalDB();
                await refreshList();
                updateGoogleMapsLink();
                // Inicializar mapa con coordenadas por defecto (Ciudad de México)
                setTimeout(() => {
                    initMap(19.4326, -99.1332);
                }, 300);
                console.log('✅ CRM Local funcionando');
            } catch (err) { console.error(err);
                showToast('Error al iniciar', 'error'); }
        }
        document.addEventListener('DOMContentLoaded', init);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (document.getElementById('modalOverlay').classList.contains('open')) {
                    document.getElementById('modalOverlay').classList.remove('open'); }
                if (currentView === 'viewForm') { resetForm();
                    switchView('viewList'); }
                if (currentView === 'viewDetail') { switchView('viewList');
                    refreshList(); }
            }
            if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
                if (currentView === 'viewList') { e.preventDefault();
                    document.getElementById('searchInput').focus(); }
            }
        });
    </script>
</body>
</html>
