<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Registro de Clientes · CRM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <!-- Leaflet CSS y JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
    </script>

    <style>
        /* ===== RESET Y BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            font-family: 'Inter', sans-serif;
            background: #f0f4ff;
            color: #0f172a;
            height: 100%;
            overflow: hidden;
        }
        button {
            font-family: inherit;
            cursor: pointer;
            border: none;
            background: none;
            color: inherit;
        }
        input,
        textarea {
            font-family: inherit;
            outline: none;
            border: none;
            background: none;
            color: inherit;
            width: 100%;
        }
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 8px;
        }

        /* ===== APP ===== */
        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 480px;
            margin: 0 auto;
            background: #ffffff;
            overflow: hidden;
            border-left: 1px solid #e0e7ff;
            border-right: 1px solid #e0e7ff;
        }

        /* ===== HEADER ===== */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: linear-gradient(135deg, #1e3a8a, #172554);
            min-height: 64px;
            flex-shrink: 0;
            border-bottom: 2px solid #f59e0b;
        }
        .app-header .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 1.15rem;
            color: #fff;
        }
        .app-header .logo i {
            font-size: 1.6rem;
            color: #fbbf24;
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header-actions button {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }
        .connection-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.65rem;
            font-weight: 600;
            color: #fff;
            padding: 4px 12px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .connection-status.online {
            background: rgba(34, 197, 94, 0.25);
            border-color: #22c55e;
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px 16px 90px;
            background: #f8fafc;
        }

        /* ===== BOTTOM NAV ===== */
        .bottom-nav {
            display: flex;
            align-items: center;
            justify-content: space-around;
            background: #fff;
            border-top: 1px solid #e0e7ff;
            min-height: 70px;
            padding: 6px 0 env(safe-area-inset-bottom, 6px) 0;
            flex-shrink: 0;
            position: relative;
            z-index: 10;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            font-size: 0.65rem;
            font-weight: 600;
            color: #64748b;
            padding: 4px 12px;
            border-radius: 8px;
            min-width: 60px;
            position: relative;
        }
        .nav-item i {
            font-size: 1.4rem;
        }
        .nav-item.active {
            color: #1e3a8a;
        }
        .nav-item .badge {
            position: absolute;
            top: -2px;
            right: 4px;
            background: #f59e0b;
            color: #fff;
            font-size: 0.55rem;
            font-weight: 700;
            padding: 1px 8px;
            border-radius: 20px;
            min-width: 18px;
            text-align: center;
        }

        .view {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .view.active {
            display: block;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== LISTA DE CLIENTES ===== */
        .list-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .list-header h2 {
            font-size: 1.2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .list-header h2 span {
            font-size: 0.75rem;
            color: #64748b;
            background: #eef2ff;
            padding: 2px 12px;
            border-radius: 30px;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: #fff;
            border: 1.5px solid #e0e7ff;
            border-radius: 10px;
            padding: 0 12px;
            margin-bottom: 14px;
        }
        .search-box:focus-within {
            border-color: #1e3a8a;
            box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.12);
        }
        .search-box input {
            padding: 10px 10px;
            font-size: 0.95rem;
            background: transparent;
        }

        .client-card {
            background: #fff;
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 10px;
            border: 1px solid #e0e7ff;
            box-shadow: 0 8px 30px rgba(30, 58, 138, 0.10);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 14px;
            position: relative;
            overflow: hidden;
        }
        .client-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, #1e3a8a, #f59e0b);
        }
        .client-card .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1e3a8a, #0d9488);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1rem;
            flex-shrink: 0;
            overflow: hidden;
        }
        .client-card .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .client-card .info {
            flex: 1;
            min-width: 0;
        }
        .client-card .info .name {
            font-weight: 600;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .client-card .info .business {
            font-size: 0.8rem;
            color: #334155;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .client-card .info .address {
            font-size: 0.7rem;
            color: #64748b;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .client-card .meta {
            text-align: right;
            flex-shrink: 0;
        }
        .client-card .meta .visits {
            font-size: 0.7rem;
            background: #eef2ff;
            padding: 2px 10px;
            border-radius: 20px;
        }
        .client-card .meta .date {
            font-size: 0.6rem;
            color: #64748b;
            margin-top: 4px;
            display: block;
        }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #64748b;
        }
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 16px;
            display: block;
            color: #d1d5db;
        }

        /* ===== FORMULARIO ===== */
        .form-card {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #e0e7ff;
            box-shadow: 0 8px 30px rgba(30, 58, 138, 0.10);
        }
        .form-card .form-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .form-group {
            margin-bottom: 14px;
        }
        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: #334155;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .form-group label .required {
            color: #dc2626;
        }
        .form-group .input-wrap {
            display: flex;
            align-items: center;
            background: #f8fafc;
            border: 1.5px solid #e0e7ff;
            border-radius: 8px;
            padding: 0 12px;
            gap: 8px;
            flex-wrap: wrap;
        }
        .form-group .input-wrap:focus-within {
            border-color: #1e3a8a;
            box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1);
        }
        .form-group .input-wrap i {
            color: #64748b;
            font-size: 0.9rem;
            width: 18px;
            text-align: center;
        }
        .form-group .input-wrap input,
        .form-group .input-wrap textarea {
            padding: 10px 0;
            font-size: 0.95rem;
            background: transparent;
            flex: 1;
            min-width: 100px;
        }
        .form-group .input-wrap textarea {
            min-height: 50px;
            padding: 8px 0;
            resize: vertical;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        /* ===== BOTONES ===== */
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex: 1;
            border: 1.5px solid transparent;
        }
        .btn:active {
            transform: scale(0.97);
        }
        .btn-primary {
            background: linear-gradient(135deg, #1e3a8a, #172554);
            color: #fff;
        }
        .btn-primary:hover {
            box-shadow: 0 8px 24px rgba(30, 58, 138, 0.25);
        }
        .btn-secondary {
            background: #f1f5f9;
            color: #334155;
            border-color: #e0e7ff;
        }
        .btn-secondary:hover {
            background: #e2e8f0;
        }
        .btn-danger {
            background: #dc2626;
            color: #fff;
        }
        .btn-danger:hover {
            background: #b91c1c;
        }
        .btn-accent {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #1e293b;
        }
        .btn-accent:hover {
            box-shadow: 0 8px 24px rgba(245, 158, 11, 0.3);
        }
        .btn-sm {
            padding: 6px 14px;
            font-size: 0.8rem;
            flex: 0 0 auto;
        }
        .btn-geo {
            background: #1e3a8a;
            color: #fff;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            border: none;
            margin: 4px 0;
        }
        .btn-geo:hover {
            background: #172554;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 18px;
        }

        /* ===== MAPA ===== */
        #map-container {
            width: 100%;
            height: 280px;
            border-radius: 10px;
            overflow: hidden;
            border: 1.5px solid #e0e7ff;
            margin-top: 10px;
            background: #f8fafc;
            position: relative;
        }
        #map-container .leaflet-control-zoom {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }
        #map-container .leaflet-control-zoom a {
            background: #fff;
            color: #1e3a8a;
            font-weight: 700;
            font-size: 1.2rem;
            width: 34px;
            height: 34px;
            line-height: 34px;
            text-align: center;
            border: 1px solid #d1d5db;
        }
        #map-container .leaflet-control-zoom a:hover {
            background: #eef2ff;
        }

        .map-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #64748b;
            gap: 8px;
            font-size: 0.9rem;
            background: #f8fafc;
        }
        .map-placeholder i {
            font-size: 2.5rem;
            color: #d1d5db;
        }

        .map-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        .map-actions .btn-sm {
            flex: 1;
            min-width: 80px;
        }

        /* ===== FOTO ===== */
        .photo-preview {
            width: 100%;
            max-height: 160px;
            object-fit: cover;
            border-radius: 8px;
            border: 1.5px solid #e0e7ff;
            margin-top: 8px;
        }
        .photo-placeholder {
            width: 100%;
            height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px dashed #e0e7ff;
            border-radius: 8px;
            color: #64748b;
            gap: 4px;
            margin-top: 8px;
            cursor: pointer;
            background: #f8fafc;
        }
        .photo-placeholder:hover {
            background: #eef2ff;
        }
        .photo-placeholder i {
            font-size: 1.8rem;
            color: #d1d5db;
        }
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            width: 100%;
        }
        .file-input-wrapper input[type=file] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        /* ===== DETALLE ===== */
        .detail-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .detail-header .back-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: #eef2ff;
            color: #1e3a8a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }
        .detail-header h2 {
            font-size: 1.2rem;
            font-weight: 700;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .detail-card {
            background: #fff;
            border-radius: 16px;
            padding: 18px 20px;
            border: 1px solid #e0e7ff;
            box-shadow: 0 8px 30px rgba(30, 58, 138, 0.10);
            margin-bottom: 14px;
            position: relative;
            overflow: hidden;
        }
        .detail-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, #1e3a8a, #f59e0b);
        }
        .detail-card .label {
            font-size: 0.65rem;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .detail-card .value {
            font-size: 0.95rem;
            font-weight: 500;
            margin-bottom: 8px;
            word-break: break-word;
        }
        .detail-card .value:last-child {
            margin-bottom: 0;
        }
        .detail-card .photo-detail {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #e0e7ff;
            margin-top: 4px;
        }

        .visit-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
            border-bottom: 1px solid #e0e7ff;
        }
        .visit-item:last-child {
            border-bottom: none;
        }
        .visit-item .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #f59e0b;
            flex-shrink: 0;
        }
        .visit-item .v-info {
            flex: 1;
        }
        .visit-item .v-info .v-date {
            font-weight: 500;
            font-size: 0.85rem;
        }
        .visit-item .v-info .v-notes {
            font-size: 0.8rem;
            color: #334155;
        }
        .visit-item .v-time {
            font-size: 0.7rem;
            color: #64748b;
        }

        /* ===== ESTADÍSTICAS ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }
        .stat-card {
            background: #fff;
            border-radius: 10px;
            padding: 16px 12px;
            border: 1px solid #e0e7ff;
            text-align: center;
            box-shadow: 0 8px 30px rgba(30, 58, 138, 0.10);
        }
        .stat-card .stat-number {
            font-size: 1.8rem;
            font-weight: 800;
            color: #1e3a8a;
        }
        .stat-card .stat-label {
            font-size: 0.65rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .stat-card .stat-icon {
            font-size: 1.2rem;
            color: #f59e0b;
            margin-bottom: 4px;
        }

        .chart-container {
            background: #fff;
            border-radius: 10px;
            padding: 16px;
            border: 1px solid #e0e7ff;
            box-shadow: 0 8px 30px rgba(30, 58, 138, 0.10);
            margin-bottom: 14px;
        }
        .chart-container h4 {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: #334155;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .bar-chart {
            display: flex;
            align-items: flex-end;
            gap: 6px;
            height: 110px;
            padding-top: 4px;
        }
        .bar-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .bar-item .bar {
            width: 100%;
            max-width: 28px;
            background: linear-gradient(180deg, #3b82f6, #1e3a8a);
            border-radius: 4px 4px 0 0;
            min-height: 4px;
            transition: height 0.5s;
        }
        .bar-item .bar-label {
            font-size: 0.5rem;
            color: #64748b;
            text-align: center;
            font-weight: 600;
        }

        /* ===== TOAST ===== */
        .toast-container {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            max-width: calc(480px - 32px);
            width: 100%;
            pointer-events: none;
        }
        .toast {
            background: #fff;
            color: #0f172a;
            padding: 12px 18px;
            border-radius: 10px;
            border: 1px solid #e0e7ff;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            font-weight: 500;
            pointer-events: auto;
            animation: slideUp 0.3s ease;
            margin-bottom: 8px;
        }
        .toast.success i {
            color: #22c55e;
        }
        .toast.error i {
            color: #ef4444;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== MODAL ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            z-index: 100;
            display: none;
            align-items: flex-end;
            justify-content: center;
        }
        .modal-overlay.open {
            display: flex;
        }
        .modal-overlay .modal {
            background: #fff;
            border-radius: 16px 16px 0 0;
            max-width: 480px;
            width: 100%;
            max-height: 85vh;
            padding: 20px 20px 30px;
            overflow-y: auto;
            animation: slideUpModal 0.3s ease;
            border-top: 1px solid #e0e7ff;
        }
        @keyframes slideUpModal {
            from {
                transform: translateY(40px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        .modal .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e0e7ff;
        }
        .modal .modal-header h3 {
            font-size: 1.1rem;
            font-weight: 700;
        }
        .modal .modal-close {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: #64748b;
        }

        @media (min-width: 640px) {
            #app {
                max-width: 520px;
                border-radius: 20px;
                margin-top: 16px;
                height: calc(100vh - 32px);
            }
        }
        @media (min-width: 1024px) {
            #app {
                max-width: 560px;
                margin-top: 24px;
                height: calc(100vh - 48px);
            }
            .modal-overlay .modal {
                border-radius: 16px;
                max-height: 80vh;
                margin-bottom: 20px;
            }
            .modal-overlay {
                align-items: center;
            }
        }

        .hidden {
            display: none !important;
        }
        .mt-8 {
            margin-top: 8px;
        }
        .flex {
            display: flex;
        }
        .gap-8 {
            gap: 8px;
        }
        .text-muted {
            color: #64748b;
        }
        .text-sm {
            font-size: 0.8rem;
        }
        .fw-600 {
            font-weight: 600;
        }
    </style>
</head>
<body>

    <!-- ========== APP ========== -->
    <div id="app">

        <!-- HEADER -->
        <header class="app-header">
            <div class="logo">
                <i class="fas fa-address-book"></i>
                <span>CRM <span style="color: #fbbf24;">·</span> Visitas</span>
            </div>
            <div class="header-actions">
                <span class="connection-status online">
                    <i class="fas fa-circle"></i> <span>local</span>
                </span>
                <button id="themeToggle" title="Cambiar tema">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </header>

        <!-- MAIN CONTENT -->
        <div class="main-content" id="mainContent">

            <!-- VIEW: LIST -->
            <div class="view active" id="viewList">
                <div class="list-header">
                    <h2>
                        <i class="fas fa-users" style="color: #1e3a8a;"></i>
                        Clientes
                        <span id="clientCount">0</span>
                    </h2>
                    <button class="btn btn-primary btn-sm" id="addQuickBtn">
                        <i class="fas fa-plus"></i> Nuevo
                    </button>
                </div>

                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Buscar por nombre, negocio o dirección..." />
                </div>

                <div id="clientListContainer">
                    <div class="empty-state">
                        <i class="fas fa-user-plus"></i>
                        <h3>Cargando clientes...</h3>
                    </div>
                </div>
            </div>

            <!-- VIEW: FORM -->
            <div class="view" id="viewForm">
                <div class="form-card">
                    <div class="form-title">
                        <i class="fas fa-pen" style="color: #1e3a8a;"></i>
                        <span id="formTitle">Nuevo Cliente</span>
                    </div>

                    <form id="clientForm" autocomplete="off">
                        <input type="hidden" id="clientId" />

                        <div class="form-group">
                            <label>Nombre del Cliente <span class="required">*</span></label>
                            <div class="input-wrap">
                                <i class="fas fa-user"></i>
                                <input type="text" id="fName" placeholder="Ej: Juan Pérez" required />
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Nombre del Negocio</label>
                            <div class="input-wrap">
                                <i class="fas fa-building"></i>
                                <input type="text" id="fBusiness" placeholder="Ej: Ferretería López" />
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Dirección <span class="required">*</span></label>
                            <div class="input-wrap" style="flex-wrap:wrap;">
                                <i class="fas fa-map-pin"></i>
                                <input type="text" id="fAddress" placeholder="Calle, número, ciudad..." required style="flex:1; min-width:120px;" />
                                <button type="button" class="btn-geo" id="geoBtn">
                                    <i class="fas fa-search-location"></i> Buscar
                                </button>
                            </div>
                            <div id="map-container">
                                <div class="map-placeholder">
                                    <i class="fas fa-map-marked-alt"></i>
                                    <span>Escribe una dirección y presiona "Buscar"</span>
                                </div>
                            </div>
                            <div class="map-actions">
                                <button type="button" class="btn btn-accent btn-sm" id="updateMapCoords">
                                    <i class="fas fa-location-dot"></i> Ver en mapa
                                </button>
                                <a href="#" id="openGoogleMaps" target="_blank" class="btn btn-secondary btn-sm" style="text-decoration:none; display:none; align-items:center; justify-content:center; gap:6px;">
                                    <i class="fab fa-google"></i> Google Maps
                                </a>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label>Latitud</label>
                                <div class="input-wrap">
                                    <i class="fas fa-arrow-up"></i>
                                    <input type="text" id="fLat" placeholder="Ej: 19.4326" />
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Longitud</label>
                                <div class="input-wrap">
                                    <i class="fas fa-arrow-right"></i>
                                    <input type="text" id="fLng" placeholder="Ej: -99.1332" />
                                </div>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label>Colonia</label>
                                <div class="input-wrap">
                                    <i class="fas fa-location-dot"></i>
                                    <input type="text" id="fColony" placeholder="Colonia" />
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Teléfono</label>
                                <div class="input-wrap">
                                    <i class="fas fa-phone"></i>
                                    <input type="tel" id="fPhone" placeholder="555-1234" />
                                </div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Señas / Referencias</label>
                            <div class="input-wrap">
                                <i class="fas fa-flag"></i>
                                <textarea id="fReferences" placeholder="Cerca del semáforo, edificio azul..."></textarea>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Foto del Negocio</label>
                            <div class="file-input-wrapper">
                                <div class="photo-placeholder" id="photoPlaceholder">
                                    <i class="fas fa-camera"></i>
                                    <span>Toca para seleccionar una foto</span>
                                </div>
                                <input type="file" id="fPhoto" accept="image/*" />
                            </div>
                            <img id="photoPreview" class="photo-preview hidden" alt="Vista previa" />
                        </div>

                        <div class="form-group">
                            <label>Notas de visita (opcional)</label>
                            <div class="input-wrap">
                                <i class="fas fa-sticky-note"></i>
                                <textarea id="fVisitNote" placeholder="Agrega una nota para esta visita..."></textarea>
                            </div>
                        </div>

                        <div class="form-actions">
                            <button type="button" class="btn btn-secondary" id="formCancelBtn">
                                <i class="fas fa-times"></i> Cancelar
                            </button>
                            <button type="submit" class="btn btn-primary" id="formSubmitBtn">
                                <i class="fas fa-save"></i> Guardar
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- VIEW: DETAIL -->
            <div class="view" id="viewDetail">
                <div class="detail-header">
                    <button class="back-btn" id="detailBackBtn">
                        <i class="fas fa-arrow-left"></i>
                    </button>
                    <h2 id="detailName">Cliente</h2>
                    <div style="display:flex;gap:4px;">
                        <button class="btn btn-primary btn-sm" id="detailEditBtn">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="btn btn-danger btn-sm" id="detailDeleteBtn">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>

                <div id="detailContent"></div>
            </div>

            <!-- VIEW: STATS -->
            <div class="view" id="viewStats">
                <h2 style="font-size:1.2rem;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:10px;">
                    <i class="fas fa-chart-simple" style="color:#1e3a8a;"></i> Estadísticas
                </h2>

                <div class="stats-grid" id="statsGrid">
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-users"></i></div>
                        <div class="stat-number" id="statTotal">0</div>
                        <div class="stat-label">Total Clientes</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-calendar-check"></i></div>
                        <div class="stat-number" id="statVisits">0</div>
                        <div class="stat-label">Visitas Totales</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-clock"></i></div>
                        <div class="stat-number" id="statToday">0</div>
                        <div class="stat-label">Visitas Hoy</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-star"></i></div>
                        <div class="stat-number" id="statTop">—</div>
                        <div class="stat-label">Más Visitado</div>
                    </div>
                </div>

                <div class="chart-container">
                    <h4><i class="fas fa-calendar-week"></i> Visitas por día (últimos 7 días)</h4>
                    <div class="bar-chart" id="weeklyChart"></div>
                </div>

                <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;">
                    <button class="btn btn-accent btn-sm" id="exportDataBtn" style="flex:1;">
                        <i class="fas fa-download"></i> Exportar JSON
                    </button>
                    <button class="btn btn-secondary btn-sm" id="importDataBtn" style="flex:1;">
                        <i class="fas fa-upload"></i> Importar JSON
                    </button>
                    <input type="file" id="importFileInput" accept=".json" style="display:none;" />
                </div>

                <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;">
                    <button class="btn btn-danger btn-sm" id="resetDataBtn" style="flex:1;">
                        <i class="fas fa-trash-can"></i> Eliminar todos
                    </button>
                </div>
            </div>
        </div>

        <!-- BOTTOM NAV -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-view="viewList">
                <i class="fas fa-list-ul"></i>
                <span>Clientes</span>
            </button>
            <button class="nav-item" data-view="viewForm" id="navAdd">
                <i class="fas fa-plus-circle"></i>
                <span>Agregar</span>
            </button>
            <button class="nav-item" data-view="viewStats">
                <i class="fas fa-chart-pie"></i>
                <span>Estadísticas</span>
                <span class="badge" id="statsBadge" style="display:none;">0</span>
            </button>
        </nav>
    </div>

    <!-- ========== TOAST ========== -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- ========== MODAL ========== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">Confirmar</h3>
                <button class="modal-close" id="modalClose"><i class="fas fa-times"></i></button>
            </div>
            <div id="modalBody" style="margin-bottom:16px;font-size:0.95rem;line-height:1.5;"></div>
            <div style="display:flex;gap:10px;">
                <button class="btn btn-secondary" id="modalCancel">Cancelar</button>
                <button class="btn btn-danger" id="modalConfirm">Confirmar</button>
            </div>
        </div>
    </div>

    <!-- ========== SCRIPT PRINCIPAL (CORREGIDO) ========== -->
    <script>
        // ======================================================================
        //  ALMACENAMIENTO LOCAL (IndexedDB)
        // ======================================================================
        const DB_NAME = 'ClientCRM';
        const STORE_NAME = 'clientes';
        let localDB = null;
        let clientDataCache = [];
        let editingId = null;
        let selectedLat = null;
        let selectedLng = null;
        let photoDataUrl = null;
        let currentView = 'viewList';
        let mapInstance = null;
        let mapMarker = null;

        function openLocalDB() {
            return new Promise((resolve, reject) => {
                if (!window.indexedDB) { reject('IndexedDB no soportado'); return; }
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
                    }
                };
                request.onsuccess = (e) => resolve(e.target.result);
                request.onerror = (e) => reject(e.target.error);
            });
        }

        async function getAllClients() {
            return new Promise((resolve, reject) => {
                if (!localDB) { reject('DB no abierta'); return; }
                const tx = localDB.transaction(STORE_NAME, 'readonly');
                const store = tx.objectStore(STORE_NAME);
                const req = store.getAll();
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        }

        async function saveClient(client) {
            return new Promise((resolve, reject) => {
                if (!localDB) { reject('DB no abierta'); return; }
                const tx = localDB.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                const req = store.put(client);
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        }

        async function deleteClient(id) {
            return new Promise((resolve, reject) => {
                if (!localDB) { reject('DB no abierta'); return; }
                const tx = localDB.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                const req = store.delete(id);
                req.onsuccess = () => resolve();
                req.onerror = () => reject(req.error);
            });
        }

        async function clearAllClients() {
            return new Promise((resolve, reject) => {
                if (!localDB) { reject('DB no abierta'); return; }
                const tx = localDB.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                const req = store.clear();
                req.onsuccess = () => resolve();
                req.onerror = () => reject(req.error);
            });
        }

        async function getClient(id) {
            const all = await getAllClients();
            return all.find(c => c.id == id) || null;
        }

        // ======================================================================
        //  TOAST Y MODAL
        // ======================================================================
        function showToast(msg, type = 'info', dur = 2800) {
            const c = document.getElementById('toastContainer');
            const el = document.createElement('div');
            el.className = `toast ${type}`;
            const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', info: 'fa-info-circle' };
            el.innerHTML = `<i class="fas ${icons[type] || icons.info}"></i> ${msg}`;
            c.appendChild(el);
            setTimeout(() => { el.style.opacity = '0';
                setTimeout(() => el.remove(), 300); }, dur);
        }

        function showModal(title, body, confirmText, onConfirm) {
            const overlay = document.getElementById('modalOverlay');
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalBody').innerHTML = body;
            document.getElementById('modalConfirm').textContent = confirmText || 'Confirmar';
            overlay.classList.add('open');
            const close = () => overlay.classList.remove('open');
            document.getElementById('modalClose').onclick = close;
            document.getElementById('modalCancel').onclick = close;
            document.getElementById('modalConfirm').onclick = () => { close(); if (onConfirm) onConfirm(); };
        }

        // ======================================================================
        //  RENDER FUNCTIONS
        // ======================================================================
        function escHtml(str) { if (!str) return ''; const d = document.createElement('div');
            d.textContent = str; return d.innerHTML; }

        function renderClientList(clients) {
            const container = document.getElementById('clientListContainer');
            const countEl = document.getElementById('clientCount');
            if (!clients || clients.length === 0) {
                container.innerHTML =
                    `<div class="empty-state"><i class="fas fa-user-plus"></i><h3>Sin clientes registrados</h3><p>Toca "Nuevo" para agregar tu primer cliente.</p></div>`;
                countEl.textContent = '0';
                return;
            }
            countEl.textContent = clients.length;
            let html = '';
            for (const c of clients) {
                const initial = (c.name || '?')[0].toUpperCase();
                const visitCount = (c.visits || []).length;
                const lastVisit = c.visits && c.visits.length > 0 ? new Date(c.visits[c.visits.length - 1].date)
                    .toLocaleDateString('es') : 'Sin visitas';
                const avatarHtml = c.photo ? `<img src="${c.photo}" alt="foto" />` : initial;
                html += `
                    <div class="client-card" data-id="${c.id}">
                        <div class="avatar">${avatarHtml}</div>
                        <div class="info">
                            <div class="name">${escHtml(c.name || 'Sin nombre')}</div>
                            <div class="business">${escHtml(c.business || 'Sin negocio')}</div>
                            <div class="address">${escHtml(c.address || 'Sin dirección')}</div>
                        </div>
                        <div class="meta">
                            <span class="visits"><i class="fas fa-calendar-check"></i> ${visitCount}</span>
                            <span class="date">${lastVisit}</span>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
            container.querySelectorAll('.client-card').forEach(el => {
                el.addEventListener('click', () => { const id = el.dataset.id;
                    showClientDetail(id); });
            });
        }

        // ======================================================================
        //  CLIENT DETAIL
        // ======================================================================
        async function showClientDetail(id) {
            const client = await getClient(id);
            if (!client) { showToast('Cliente no encontrado', 'error'); return; }
            const container = document.getElementById('detailContent');
            document.getElementById('detailName').textContent = client.name || 'Cliente';
            const visits = client.visits || [];
            const visitHtml = visits.length === 0 ?
                '<p class="text-muted text-sm" style="padding:6px 0;">No hay visitas registradas.</p>' :
                visits.map(v =>
                    `<div class="visit-item"><div class="dot"></div><div class="v-info"><div class="v-date">${new Date(v.date).toLocaleDateString('es', { weekday:'short', day:'numeric', month:'short', year:'numeric' })}</div>${v.notes ? `<div class="v-notes">${escHtml(v.notes)}</div>` : ''}</div><div class="v-time">${new Date(v.date).toLocaleTimeString('es', { hour:'2-digit', minute:'2-digit' })}</div></div>`
                ).join('');
            const lat = client.lat || '';
            const lng = client.lng || '';
            const photoHtml = client.photo ? `<img src="${client.photo}" class="photo-detail" alt="Foto" />` :
                '<p class="text-muted text-sm">Sin foto</p>';
            container.innerHTML = `
                <div class="detail-card"><div class="label"><i class="fas fa-user"></i> Cliente</div><div class="value"><strong>${escHtml(client.name || '—')}</strong></div>${client.business ? `<div class="label"><i class="fas fa-building"></i> Negocio</div><div class="value">${escHtml(client.business)}</div>` : ''}</div>
                <div class="detail-card"><div class="label"><i class="fas fa-map-pin"></i> Dirección</div><div class="value">${escHtml(client.address || 'Sin dirección')}</div>${client.colony ? `<div class="label"><i class="fas fa-location-dot"></i> Colonia</div><div class="value">${escHtml(client.colony)}</div>` : ''}${client.references ? `<div class="label"><i class="fas fa-flag"></i> Señas</div><div class="value">${escHtml(client.references)}</div>` : ''}${client.phone ? `<div class="label"><i class="fas fa-phone"></i> Teléfono</div><div class="value"><a href="tel:${escHtml(client.phone)}" style="color:#1e3a8a;text-decoration:none;">${escHtml(client.phone)}</a></div>` : ''}${lat && lng ? `<div class="label"><i class="fas fa-globe"></i> Coordenadas</div><div class="value">${lat}, ${lng}</div>` : ''}</div>
                <div class="detail-card"><div class="label"><i class="fas fa-image"></i> Foto</div><div class="value">${photoHtml}</div></div>
                <div class="detail-card"><div class="label"><i class="fas fa-map"></i> Ubicación</div>
                <div id="detailMapContainer" style="height:200px;border-radius:8px;overflow:hidden;border:1px solid #e0e7ff;margin-top:4px;background:#f8fafc;position:relative;">
                    <div class="map-placeholder" style="height:100%;"><i class="fas fa-map-marked-alt"></i><span>Cargando mapa...</span></div>
                </div>
                </div>
                <div class="detail-card"><div class="label"><i class="fas fa-calendar-check"></i> Visitas (${visits.length})</div><div class="visit-timeline">${visitHtml}</div><button class="btn btn-accent btn-sm" style="margin-top:12px;width:100%;" id="addVisitBtn"><i class="fas fa-plus"></i> Registrar Visita</button></div>
            `;
            window._detailClientId = id;

            // Inicializar mapa en detalle después de un pequeño delay
            setTimeout(() => {
                initDetailMap(lat, lng);
            }, 300);

            document.getElementById('addVisitBtn').addEventListener('click', () => {
                showModal('Registrar Visita',
                    `<div class="form-group"><label>Nota</label><div class="input-wrap"><i class="fas fa-sticky-note"></i><textarea id="visitNoteInput" placeholder="¿Qué se trató?" style="min-height:60px;"></textarea></div></div>`,
                    'Registrar', async () => {
                        const note = document.getElementById('visitNoteInput')?.value || '';
                        await addVisitToClient(id, note);
                        showToast('Visita registrada ✅', 'success');
                        showClientDetail(id);
                    });
            });
            document.getElementById('detailEditBtn').onclick = () => editClient(id);
            document.getElementById('detailDeleteBtn').onclick = () => {
                showModal('Eliminar Cliente', `¿Eliminar a <strong>${escHtml(client.name)}</strong>?`, 'Eliminar',
                    async () => { await deleteClient(id);
                        showToast('Eliminado', 'info');
                        switchView('viewList');
                        refreshList(); });
            };
            switchView('viewDetail');
        }

        async function addVisitToClient(clientId, notes = '') {
            const client = await getClient(clientId);
            if (!client) return;
            const visits = client.visits || [];
            visits.push({ date: Date.now(), notes: notes || '' });
            client.visits = visits;
            await saveClient(client);
            refreshList();
        }

        // ======================================================================
        //  FORM - EDITAR CLIENTE (CORREGIDO)
        // ======================================================================
        function editClient(id) {
            editingId = id;
            document.getElementById('formTitle').textContent = 'Editar Cliente';
            document.getElementById('formSubmitBtn').innerHTML = '<i class="fas fa-save"></i> Actualizar';
            getClient(id).then(c => {
                if (!c) { showToast('No encontrado', 'error'); return; }
                document.getElementById('clientId').value = c.id;
                document.getElementById('fName').value = c.name || '';
                document.getElementById('fBusiness').value = c.business || '';
                document.getElementById('fAddress').value = c.address || '';
                document.getElementById('fColony').value = c.colony || '';
                document.getElementById('fPhone').value = c.phone || '';
                document.getElementById('fReferences').value = c.references || '';
                document.getElementById('fVisitNote').value = '';
                document.getElementById('fLat').value = c.lat || '';
                document.getElementById('fLng').value = c.lng || '';
                selectedLat = c.lat || null;
                selectedLng = c.lng || null;

                // Cambiar a la vista del formulario
                switchView('viewForm');

                // Esperar a que el DOM se renderice y luego actualizar el mapa
                setTimeout(() => {
                    if (selectedLat && selectedLng) {
                        updateMap(selectedLat, selectedLng);
                    } else {
                        resetMapPlaceholder();
                    }
                }, 300);

                updateGoogleMapsLink();

                // Foto
                if (c.photo) {
                    photoDataUrl = c.photo;
                    document.getElementById('photoPreview').src = c.photo;
                    document.getElementById('photoPreview').classList.remove('hidden');
                    document.getElementById('photoPlaceholder').style.display = 'none';
                } else {
                    photoDataUrl = null;
                    document.getElementById('photoPreview').classList.add('hidden');
                    document.getElementById('photoPlaceholder').style.display = 'flex';
                }
            });
        }

        function resetForm() {
            document.getElementById('clientForm').reset();
            document.getElementById('clientId').value = '';
            editingId = null;
            document.getElementById('formTitle').textContent = 'Nuevo Cliente';
            document.getElementById('formSubmitBtn').innerHTML = '<i class="fas fa-save"></i> Guardar';
            selectedLat = null;
            selectedLng = null;
            document.getElementById('fLat').value = '';
            document.getElementById('fLng').value = '';
            resetMapPlaceholder();
            document.getElementById('fVisitNote').value = '';
            photoDataUrl = null;
            document.getElementById('photoPreview').classList.add('hidden');
            document.getElementById('photoPreview').src = '';
            document.getElementById('photoPlaceholder').style.display = 'flex';
            document.getElementById('fPhoto').value = '';
            updateGoogleMapsLink();
        }

        function resetMapPlaceholder() {
            const container = document.getElementById('map-container');
            // Destruir mapa anterior si existe
            if (mapInstance) {
                mapInstance.remove();
                mapInstance = null;
                mapMarker = null;
            }
            container.innerHTML = `
                <div class="map-placeholder">
                    <i class="fas fa-map-marked-alt"></i>
                    <span>Escribe una dirección y presiona "Buscar"</span>
                </div>
            `;
            updateGoogleMapsLink();
        }

        // ======================================================================
        //  INICIALIZAR MAPA CON LEAFLET (CORREGIDO)
        // ======================================================================
        function initMap(lat, lng) {
            const container = document.getElementById('map-container');
            if (!container) return;

            // Si ya hay mapa, destruirlo
            if (mapInstance) {
                mapInstance.remove();
                mapInstance = null;
                mapMarker = null;
            }

            // Limpiar contenedor
            container.innerHTML = '';

            // Validar coordenadas
            const latNum = parseFloat(lat);
            const lngNum = parseFloat(lng);
            if (isNaN(latNum) || isNaN(lngNum)) {
                container.innerHTML = `
                    <div class="map-placeholder">
                        <i class="fas fa-map-marked-alt"></i>
                        <span>Coordenadas no válidas</span>
                    </div>
                `;
                return;
            }

            // Verificar que el contenedor tenga dimensiones
            if (container.clientHeight === 0) {
                // Si el contenedor aún no tiene altura, esperar
                setTimeout(() => initMap(lat, lng), 200);
                return;
            }

            // Crear mapa con Leaflet
            try {
                mapInstance = L.map(container, {
                    zoomControl: true,
                    fadeAnimation: true,
                    zoomAnimation: true,
                    attributionControl: true
                }).setView([latNum, lngNum], 15);

                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap',
                    maxZoom: 19,
                    minZoom: 1
                }).addTo(mapInstance);

                // Marcador
                const icon = L.divIcon({
                    className: 'custom-marker',
                    html: '<i class="fas fa-map-pin" style="color:#1e3a8a;font-size:2rem;text-shadow:0 2px 4px rgba(0,0,0,0.3);"></i>',
                    iconSize: [30, 30],
                    iconAnchor: [15, 30]
                });
                mapMarker = L.marker([latNum, lngNum], { icon: icon }).addTo(mapInstance);
                const name = document.getElementById('fName').value || 'Cliente';
                const address = document.getElementById('fAddress').value || '';
                mapMarker.bindPopup(`<b>${escHtml(name)}</b><br>${escHtml(address)}`);

                // Forzar actualización del tamaño
                setTimeout(() => {
                    if (mapInstance) mapInstance.invalidateSize();
                }, 200);

                updateGoogleMapsLink();

            } catch (err) {
                console.error('Error al inicializar mapa:', err);
                container.innerHTML = `
                    <div class="map-placeholder">
                        <i class="fas fa-exclamation-triangle" style="color:#ef4444;"></i>
                        <span>Error al cargar el mapa</span>
                    </div>
                `;
            }
        }

        // ======================================================================
        //  INICIALIZAR MAPA EN DETALLE
        // ======================================================================
        function initDetailMap(lat, lng) {
            const container = document.getElementById('detailMapContainer');
            if (!container) return;

            const latNum = parseFloat(lat);
            const lngNum = parseFloat(lng);
            if (isNaN(latNum) || isNaN(lngNum)) {
                container.innerHTML = `
                    <div class="map-placeholder" style="height:100%;">
                        <i class="fas fa-map-marked-alt"></i>
                        <span>Ubicación no disponible</span>
                    </div>
                `;
                return;
            }

            try {
                // Limpiar contenedor
                container.innerHTML = '';

                const map = L.map(container, {
                    zoomControl: true,
                    fadeAnimation: true,
                    zoomAnimation: true
                }).setView([latNum, lngNum], 15);

                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap',
                    maxZoom: 19,
                    minZoom: 1
                }).addTo(map);

                const icon = L.divIcon({
                    className: 'custom-marker',
                    html: '<i class="fas fa-map-pin" style="color:#1e3a8a;font-size:2rem;text-shadow:0 2px 4px rgba(0,0,0,0.3);"></i>',
                    iconSize: [30, 30],
                    iconAnchor: [15, 30]
                });
                L.marker([latNum, lngNum], { icon: icon }).addTo(map);

                setTimeout(() => { map.invalidateSize(); }, 300);

            } catch (err) {
                console.error('Error en mapa de detalle:', err);
                container.innerHTML = `
                    <div class="map-placeholder" style="height:100%;">
                        <i class="fas fa-exclamation-triangle" style="color:#ef4444;"></i>
                        <span>Error al cargar el mapa</span>
                    </div>
                `;
            }
        }

        // ======================================================================
        //  ACTUALIZAR MAPA DESDE COORDENADAS
        // ======================================================================
        function updateMap(lat, lng) {
            const latNum = parseFloat(lat);
            const lngNum = parseFloat(lng);
            if (isNaN(latNum) || isNaN(lngNum)) {
                resetMapPlaceholder();
                return;
            }
            initMap(latNum, lngNum);
        }

        function showMapLoading() {
            const container = document.getElementById('map-container');
            container.innerHTML = `
                <div class="map-loading" style="position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.8);z-index:5;font-weight:600;color:#1e3a8a;gap:8px;">
                    <i class="fas fa-spinner fa-spin"></i> Buscando ubicación...
                </div>
            `;
        }

        function updateGoogleMapsLink() {
            const lat = document.getElementById('fLat').value.trim();
            const lng = document.getElementById('fLng').value.trim();
            const link = document.getElementById('openGoogleMaps');
            if (lat && lng) { link.href = `https://www.google.com/maps?q=${lat},${lng}`;
                link.style.display = 'inline-flex'; } else { link.href = '#';
                link.style.display = 'none'; }
        }

        // ======================================================================
        //  GEOCODIFICACIÓN (OpenStreetMap)
        // ======================================================================
        async function geocodeManual() {
            const address = document.getElementById('fAddress').value.trim();
            if (!address) { showToast('Escribe una dirección', 'error'); return; }
            showMapLoading();
            try {
                const url =
                    `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}&limit=1&countrycodes=mx`;
                const response = await fetch(url, { headers: { 'User-Agent': 'CRM-Client/1.0' } });
                const data = await response.json();
                if (data && data.length > 0) {
                    const lat = parseFloat(data[0].lat);
                    const lng = parseFloat(data[0].lon);
                    selectedLat = lat;
                    selectedLng = lng;
                    document.getElementById('fLat').value = lat;
                    document.getElementById('fLng').value = lng;
                    updateMap(lat, lng);
                    const parts = data[0].display_name.split(',');
                    if (parts.length > 2) {
                        const colony = parts[parts.length - 3]?.trim() || '';
                        if (colony && !document.getElementById('fColony').value) {
                            document.getElementById('fColony').value = colony;
                        }
                    }
                    updateGoogleMapsLink();
                    showToast('Ubicación encontrada 📍', 'success');
                } else { resetMapPlaceholder();
                    showToast('No se encontró la dirección', 'error'); }
            } catch (err) { resetMapPlaceholder();
                showToast('Error al geocodificar', 'error'); }
        }

        function updateMapFromCoords() {
            const lat = document.getElementById('fLat').value.trim();
            const lng = document.getElementById('fLng').value.trim();
            if (lat && lng) {
                const latNum = parseFloat(lat);
                const lngNum = parseFloat(lng);
                if (!isNaN(latNum) && !isNaN(lngNum)) {
                    selectedLat = latNum;
                    selectedLng = lngNum;
                    updateMap(latNum, lngNum);
                    updateGoogleMapsLink();
                    showToast('Mapa actualizado 📍', 'success');
                } else { showToast('Coordenadas inválidas', 'error'); }
            } else { showToast('Ingresa latitud y longitud', 'error'); }
        }

        // ======================================================================
        //  FOTO
        // ======================================================================
        document.getElementById('fPhoto').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            if (file.size > 1024 * 1024) { showToast('Máx 1MB', 'error');
                this.value = ''; return; }
            const reader = new FileReader();
            reader.onload = function(event) {
                photoDataUrl = event.target.result;
                document.getElementById('photoPreview').src = photoDataUrl;
                document.getElementById('photoPreview').classList.remove('hidden');
                document.getElementById('photoPlaceholder').style.display = 'none';
                showToast('Foto cargada ✅', 'success');
            };
            reader.onerror = function() { showToast('Error al leer', 'error'); };
            reader.readAsDataURL(file);
        });
        document.getElementById('photoPlaceholder').addEventListener('click', function() { document.getElementById('fPhoto')
                .click(); });

        // ======================================================================
        //  GUARDAR
        // ======================================================================
        document.getElementById('clientForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const submitBtn = document.getElementById('formSubmitBtn');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Guardando...';
            submitBtn.disabled = true;
            try {
                const name = document.getElementById('fName').value.trim();
                const business = document.getElementById('fBusiness').value.trim();
                const address = document.getElementById('fAddress').value.trim();
                const colony = document.getElementById('fColony').value.trim();
                const phone = document.getElementById('fPhone').value.trim();
                const references = document.getElementById('fReferences').value.trim();
                const visitNote = document.getElementById('fVisitNote').value.trim();
                const lat = document.getElementById('fLat').value.trim();
                const lng = document.getElementById('fLng').value.trim();

                if (!name) { showToast('Nombre obligatorio', 'error'); return; }
                if (!address) { showToast('Dirección obligatoria', 'error'); return; }

                const id = document.getElementById('clientId').value;
                const clientData = {
                    name,
                    business: business || '',
                    address,
                    colony: colony || '',
                    phone: phone || '',
                    references: references || '',
                    lat: lat || null,
                    lng: lng || null,
                    photo: photoDataUrl || null,
                    updatedAt: Date.now()
                };

                if (id) {
                    const existing = await getClient(id);
                    if (!existing) throw new Error('No existe');
                    let visits = existing.visits || [];
                    if (visitNote) visits.push({ date: Date.now(), notes: visitNote });
                    clientData.visits = visits;
                    clientData.createdAt = existing.createdAt || Date.now();
                    clientData.id = id;
                    await saveClient(clientData);
                    showToast('Actualizado ✅', 'success');
                } else {
                    const newClient = { ...clientData, visits: visitNote ? [{ date: Date.now(), notes: visitNote }] : [],
                        createdAt: Date.now() };
                    await saveClient(newClient);
                    showToast('Registrado ✅', 'success');
                }

                // Actualizar el mapa con las coordenadas guardadas
                if (lat && lng) {
                    updateMap(parseFloat(lat), parseFloat(lng));
                } else {
                    resetMapPlaceholder();
                }

                resetForm();
                switchView('viewList');
                refreshList();
            } catch (err) { showToast('Error: ' + err.message, 'error'); } finally { submitBtn.innerHTML = originalText;
                submitBtn.disabled = false; }
        });

        document.getElementById('formCancelBtn').addEventListener('click', () => { resetForm();
            switchView('viewList'); });

        // ======================================================================
        //  EXPORT / IMPORT
        // ======================================================================
        document.getElementById('exportDataBtn').addEventListener('click', async () => {
            const clients = await getAllClients();
            const blob = new Blob([JSON.stringify(clients, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `clientes_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('Exportado ✅', 'success');
        });

        document.getElementById('importDataBtn').addEventListener('click', () => { document.getElementById('importFileInput')
                .click(); });
        document.getElementById('importFileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            try {
                const text = await file.text();
                const data = JSON.parse(text);
                if (!Array.isArray(data)) throw new Error('Formato inválido');
                showModal('Importar Datos',
                    `Se encontraron ${data.length} clientes. ¿Reemplazar todos o fusionar?`, 'Reemplazar',
                    async () => {
                        await clearAllClients();
                        for (const c of data) {
                            if (!c.name) c.name = 'Sin nombre';
                            if (!c.address) c.address = 'Sin dirección';
                            if (!c.visits) c.visits = [];
                            if (!c.createdAt) c.createdAt = Date.now();
                            if (!c.updatedAt) c.updatedAt = Date.now();
                            await saveClient(c);
                        }
                        showToast(`Importados ${data.length} clientes ✅`, 'success');
                        refreshList();
                        e.target.value = '';
                    }
                );
                // Botón fusionar
                const footer = document.querySelector('.modal > div:last-child');
                const mergeBtn = document.createElement('button');
                mergeBtn.className = 'btn btn-primary';
                mergeBtn.innerHTML = '<i class="fas fa-plus"></i> Fusionar';
                mergeBtn.onclick = () => {
                    document.getElementById('modalOverlay').classList.remove('open');
                    (async () => {
                        const existing = await getAllClients();
                        const existingNames = new Set(existing.map(c => (c.name + c.address).toLowerCase()));
                        let added = 0;
                        for (const c of data) {
                            const key = (c.name || '') + (c.address || '');
                            if (!existingNames.has(key.toLowerCase())) {
                                if (!c.name) c.name = 'Sin nombre';
                                if (!c.address) c.address = 'Sin dirección';
                                if (!c.visits) c.visits = [];
                                if (!c.createdAt) c.createdAt = Date.now();
                                if (!c.updatedAt) c.updatedAt = Date.now();
                                await saveClient(c);
                                added++;
                                existingNames.add(key.toLowerCase());
                            }
                        }
                        showToast(`Fusionados ${added} nuevos ✅`, 'success');
                        refreshList();
                        e.target.value = '';
                    })();
                };
                footer.appendChild(mergeBtn);
            } catch (err) { showToast('Error: ' + err.message, 'error');
                e.target.value = ''; }
        });

        // ======================================================================
        //  REFRESH LIST
        // ======================================================================
        async function refreshList() {
            const clients = await getAllClients();
            clientDataCache = clients;
            renderClientList(clients);
            updateStatsBadge(clients);
            if (document.getElementById('viewStats').classList.contains('active')) renderStats();
        }

        // ======================================================================
        //  STATS
        // ======================================================================
        function renderStats() {
            const clients = clientDataCache;
            if (!clients || clients.length === 0) {
                document.getElementById('statTotal').textContent = '0';
                document.getElementById('statVisits').textContent = '0';
                document.getElementById('statToday').textContent = '0';
                document.getElementById('statTop').textContent = '—';
                document.getElementById('weeklyChart').innerHTML =
                    '<div class="text-muted text-sm" style="padding:20px 0;text-align:center;">Sin datos</div>';
                return;
            }
            const total = clients.length;
            let totalVisits = 0,
                todayVisits = 0;
            const today = new Date().toDateString();
            const days = [];
            for (let i = 6; i >= 0; i--) { const d = new Date();
                d.setDate(d.getDate() - i);
                days.push(d.toDateString()); }
            const dayCounts = {};
            for (const d of days) dayCounts[d] = 0;
            let topClient = null,
                topCount = 0;
            for (const c of clients) {
                if (c.visits) {
                    totalVisits += c.visits.length;
                    for (const v of c.visits) {
                        const d = new Date(v.date).toDateString();
                        if (d === today) todayVisits++;
                        if (dayCounts[d] !== undefined) dayCounts[d]++;
                    }
                    if (c.visits.length > topCount) { topCount = c.visits.length;
                        topClient = c; }
                }
            }
            document.getElementById('statTotal').textContent = total;
            document.getElementById('statVisits').textContent = totalVisits;
            document.getElementById('statToday').textContent = todayVisits;
            document.getElementById('statTop').textContent = topClient ? topClient.name : '—';
            const chart = document.getElementById('weeklyChart');
            const maxVal = Math.max(1, ...Object.values(dayCounts));
            let chartHtml = '';
            const dayNames = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
            for (const [d, count] of Object.entries(dayCounts)) {
                const pct = maxVal > 0 ? (count / maxVal) * 100 : 0;
                const label = dayNames[new Date(d).getDay()] || '';
                chartHtml +=
                    `<div class="bar-item"><div class="bar" style="height:${Math.max(4, pct)}%;background:${count > 0 ? '#3b82f6' : '#e2e8f0'};"></div><div class="bar-label">${label}</div><div class="bar-label" style="font-size:0.5rem;font-weight:600;color:#64748b;">${count}</div></div>`;
            }
            chart.innerHTML = chartHtml;
        }

        function updateStatsBadge(clients) {
            const badge = document.getElementById('statsBadge');
            if (clients && clients.length > 0) {
                const today = new Date().toDateString();
                let todayVisits = 0;
                for (const c of clients) {
                    if (c.visits) {
                        for (const v of c.visits) {
